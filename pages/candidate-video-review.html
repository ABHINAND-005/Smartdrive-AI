<style>
/* Video Review Specific Styles */
.video-review-panel {
  display: grid;
  grid-template-columns: 1.3fr 0.7fr;
  gap: 24px;
}

.video-player-container {
  background-color: #020617;
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: relative;
  border: 1px solid var(--border-color);
}

.mock-video-canvas {
  width: 100%;
  aspect-ratio: 16/9;
  display: block;
  background-color: #0f172a;
}

.video-hud {
  position: absolute;
  top: 15px;
  left: 15px;
  right: 15px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  pointer-events: none;
  z-index: 5;
}

.hud-pill {
  background: rgba(15, 23, 42, 0.85);
  backdrop-filter: blur(4px);
  color: #fff;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  font-size: 0.75rem;
  font-family: monospace;
  font-weight: 600;
  border: 1px solid rgba(255, 255, 255, 0.15);
  display: flex;
  align-items: center;
  gap: 6px;
}

.hud-pill.danger {
  background: rgba(239, 68, 68, 0.85);
  border-color: rgba(239, 68, 68, 0.3);
}

.hud-pill.recording::before {
  content: "";
  display: inline-block;
  width: 8px;
  height: 8px;
  background-color: #ef4444;
  border-radius: 50%;
  animation: pulse 1s infinite;
}

.video-timeline-wrapper {
  padding: 16px 20px;
  background-color: var(--bg-card);
  border-top: 1px solid var(--border-color);
}

.timeline-scrubber-bar {
  height: 8px;
  background-color: var(--border-color);
  border-radius: 4px;
  position: relative;
  cursor: pointer;
  margin-bottom: 15px;
}

.timeline-progress {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  background-color: var(--primary);
  border-radius: 4px;
  width: 0%;
}

.timeline-handle {
  position: absolute;
  top: -4px;
  width: 16px;
  height: 16px;
  background-color: #fff;
  border: 3px solid var(--primary);
  border-radius: 50%;
  cursor: pointer;
  transform: translateX(-50%);
  box-shadow: var(--shadow-sm);
  z-index: 3;
}

.timeline-marker {
  position: absolute;
  top: -4px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  transform: translateX(-50%);
  z-index: 2;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.timeline-marker::after {
  content: "";
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background-color: var(--danger);
  border: 2px solid var(--bg-card);
  box-shadow: 0 0 8px var(--danger);
}

.timeline-marker.warning::after {
  background-color: var(--warning);
  box-shadow: 0 0 8px var(--warning);
}

.timeline-marker-tooltip {
  display: none;
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background-color: #0f172a;
  color: white;
  padding: 4px 8px;
  font-size: 0.7rem;
  border-radius: 4px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 10;
}

.timeline-marker:hover .timeline-marker-tooltip {
  display: block;
}

.timeline-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.controls-left {
  display: flex;
  gap: 16px;
  align-items: center;
}

.control-btn {
  background: none;
  border: none;
  color: var(--text-main);
  font-size: 1.1rem;
  cursor: pointer;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}

.control-btn:hover {
  background-color: var(--border-color);
  color: var(--primary);
}

.video-time-disp {
  font-size: 0.85rem;
  font-family: monospace;
  color: var(--text-sub);
}

/* Violations Listing panel */
.violations-list-panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-height: 480px;
  overflow-y: auto;
  padding-right: 4px;
}

.violation-card-item {
  display: flex;
  gap: 14px;
  padding: 14px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-color);
  background-color: var(--bg-card);
  cursor: pointer;
  transition: all 0.2s ease;
}

.violation-card-item:hover {
  border-color: var(--danger);
  transform: translateX(4px);
  background-color: var(--danger-light);
}

[data-theme="dark"] .violation-card-item:hover {
  background-color: rgba(239, 68, 68, 0.08);
}

.violation-card-item.active {
  border-color: var(--danger);
  box-shadow: 0 0 10px var(--danger-glow);
  background-color: var(--danger-light);
}

[data-theme="dark"] .violation-card-item.active {
  background-color: rgba(239, 68, 68, 0.12);
}

.violation-card-item.severity-warning:hover,
.violation-card-item.severity-warning.active {
  border-color: var(--warning);
  background-color: var(--warning-light);
}

[data-theme="dark"] .violation-card-item.severity-warning:hover,
[data-theme="dark"] .violation-card-item.severity-warning.active {
  background-color: rgba(245, 158, 11, 0.08);
}

.violation-card-icon {
  width: 38px;
  height: 38px;
  border-radius: var(--radius-sm);
  background-color: var(--danger-light);
  color: var(--danger);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}

.violation-card-item.severity-warning .violation-card-icon {
  background-color: var(--warning-light);
  color: var(--warning);
}

.violation-card-info {
  flex: 1;
  min-width: 0;
}

.violation-card-title {
  font-weight: 700;
  font-size: 0.9rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2px;
}

.violation-card-title span {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-muted);
}

.violation-card-desc {
  font-size: 0.8rem;
  color: var(--text-sub);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Violation Evidence Screenshot */
.screenshot-evidence-container {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-color);
  background-color: var(--bg-main);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.screenshot-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.screenshot-stamp {
  position: absolute;
  bottom: 10px;
  right: 10px;
  background-color: rgba(0, 0, 0, 0.75);
  color: white;
  font-size: 0.75rem;
  padding: 4px 8px;
  border-radius: 4px;
  font-family: monospace;
}
</style>

<div class="video-review-panel">
  
  <!-- Video Player Mock & Timeline scrubber -->
  <div style="display:flex; flex-direction:column; gap:16px;">
    <div class="video-player-container">
      
      <!-- Canvas rendering path tracker -->
      <canvas id="review-canvas" class="mock-video-canvas" width="640" height="360"></canvas>
      
      <div class="video-hud">
        <div class="hud-pill recording"><i class="fa-solid fa-circle"></i> TRACK OVERLAY</div>
        <div class="hud-pill" id="review-hud-velocity">SPEED: 12 km/h</div>
        <div class="hud-pill danger" id="review-hud-alert" style="display:none;">BOUNDARY CROSSING</div>
      </div>
    </div>

    <!-- Timeline Scrubber -->
    <div class="video-timeline-wrapper card">
      <div class="timeline-scrubber-bar" id="review-scrubber" onclick="app.handleScrub(event)">
        <div class="timeline-progress" id="review-progress-bar"></div>
        <div class="timeline-handle" id="review-scrubber-handle"></div>
        <div id="review-timeline-markers">
          <!-- Markers will be populated dynamically -->
        </div>
      </div>
      
      <div class="timeline-controls">
        <div class="controls-left">
          <button class="control-btn" id="review-play-btn" onclick="app.togglePlay()"><i class="fa-solid fa-play"></i></button>
          <button class="control-btn" onclick="app.resetVideo()"><i class="fa-solid fa-arrow-rotate-left"></i></button>
          <span class="video-time-disp" id="review-time-display">00:00 / 00:30</span>
        </div>
        <div style="font-size:0.8rem; color:var(--text-muted);">
          <i class="fa-solid fa-circle-question"></i> Click timestamp markers to jump to violations
        </div>
      </div>
    </div>
  </div>

  <!-- Selected Violation Info & Capture Evidence -->
  <div style="display:flex; flex-direction:column; gap:20px;">
    <div class="card">
      <h3 style="margin-bottom:14px;"><i class="fa-solid fa-image"></i> AI Capture Frame</h3>
      <div class="screenshot-evidence-container">
        <!-- Static canvas simulation capture frame drawn dynamically -->
        <canvas id="evidence-canvas" width="320" height="180" style="width:100%; height:100%; object-fit:cover;"></canvas>
        <span class="screenshot-stamp" id="review-evidence-timestamp">00:14</span>
      </div>
      <div style="margin-top:12px; font-size:0.8rem; color:var(--text-muted); text-align:center;">
        Camera Frame Overlay • RTO Vision Sensor 2
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:12px;"><i class="fa-solid fa-clipboard-list"></i> Violation Details</h3>
      <div id="review-selected-violation-details">
        <!-- Active violation description will render here -->
        <p style="font-size:0.9rem; color:var(--text-sub);">Select a violation from the timeline scrubber or play the video to see active boundary overlays.</p>
      </div>
    </div>
  </div>

</div>
