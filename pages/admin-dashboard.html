<!-- Admin Stats Cards -->
<div class="grid-cols-4">
  <div class="card stat-card">
    <div class="stat-icon bg-primary-light"><i class="fa-solid fa-users"></i></div>
    <div class="stat-info">
      <span class="stat-lbl">Total Candidates</span>
      <span class="stat-val" id="admin-stat-total">148</span>
    </div>
  </div>
  <div class="card stat-card">
    <div class="stat-icon bg-success-light"><i class="fa-solid fa-circle-check"></i></div>
    <div class="stat-info">
      <span class="stat-lbl">Passed Candidates</span>
      <span class="stat-val" id="admin-stat-passed">104</span>
    </div>
  </div>
  <div class="card stat-card">
    <div class="stat-icon bg-danger-light"><i class="fa-solid fa-triangle-exclamation"></i></div>
    <div class="stat-info">
      <span class="stat-lbl">Failed Candidates</span>
      <span class="stat-val" id="admin-stat-failed">38</span>
    </div>
  </div>
  <div class="card stat-card">
    <div class="stat-icon bg-warning-light"><i class="fa-solid fa-hourglass-half"></i></div>
    <div class="stat-info">
      <span class="stat-lbl">Pending Review</span>
      <span class="stat-val" id="admin-stat-pending">6</span>
    </div>
  </div>
</div>

<!-- Pass rates and activity logs -->
<div class="grid-cols-2-1">
  
  <!-- Recent tests evaluations list -->
  <div class="card">
    <div class="card-title-bar">
      <h3>Recent Test Evaluations</h3>
      <button class="btn btn-secondary btn-sm" onclick="app.route('admin-candidates')">
        Manage Candidates <i class="fa-solid fa-arrow-right"></i>
      </button>
    </div>

    <div class="table-responsive">
      <table class="rto-table">
        <thead>
          <tr>
            <th>Candidate</th>
            <th>App Number</th>
            <th>Test Date</th>
            <th>AI Score</th>
            <th>Decision</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="admin-dashboard-recent-table">
          <!-- Rendered dynamically -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- Pass Rate summary & accuracy -->
  <div style="display:flex; flex-direction:column; gap:20px;">
    <div class="card" style="display:flex; flex-direction:column; justify-content:space-between;">
      <div>
        <h3 style="margin-bottom:12px;">Evaluation Center</h3>
        <p style="font-size:0.85rem; color:var(--text-sub);">Connected to RTO Kasaragod Sub-Station (Track 4).</p>
      </div>
      <div style="margin-top:20px; display:flex; gap:12px;">
        <button class="btn btn-primary" style="width:100%" onclick="app.route('admin-video-evaluation')">
          <i class="fa-solid fa-cloud-arrow-up"></i> Upload Test Video
        </button>
      </div>
    </div>
  </div>

</div>

<script>
app.renderAdminDashboard = function() {
  const total = this.candidates.length;
  const passed = this.candidates.filter(c => (c.status || "").trim().toLowerCase() === "passed").length;
  const failed = this.candidates.filter(c => (c.status || "").trim().toLowerCase() === "failed").length;
  const pending = this.candidates.filter(c => {
    const s = (c.status || "").trim().toLowerCase();
    return s === "pending" || s === "processing";
  }).length;

  document.getElementById("admin-stat-total").innerText = total;
  document.getElementById("admin-stat-passed").innerText = passed;
  document.getElementById("admin-stat-failed").innerText = failed;
  document.getElementById("admin-stat-pending").innerText = pending;

  const tbody = document.getElementById("admin-dashboard-recent-table");
  tbody.innerHTML = "";
  
  const sorted = [...this.candidates].reverse().slice(0, 5);
  sorted.forEach(c => {
    const row = document.createElement("tr");
    const statusLower = (c.status || "").trim().toLowerCase();
    let badgeClass = "badge-success";
    if (statusLower === "failed") badgeClass = "badge-danger";
    else if (statusLower === "pending" || statusLower === "processing") badgeClass = "badge-warning";

    row.innerHTML = `
      <td><strong>${c.name}</strong></td>
      <td style="font-family:monospace;">${c.appNo}</td>
      <td>${c.testDate}</td>
      <td><strong>${c.score}</strong></td>
      <td><span class="badge ${badgeClass}">${c.status}</span></td>
      <td class="table-action-row">
        <button class="table-action-btn" onclick="app.viewCandidateProfile('${c.id}')" title="View details"><i class="fa-solid fa-eye"></i></button>
        <button class="table-action-btn" onclick="app.overrideAIResult('${c.id}')" title="Override decision"><i class="fa-solid fa-sliders"></i></button>
      </td>
    `;
    tbody.appendChild(row);
  });
};
</script>
