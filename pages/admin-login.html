<style>
/* Authentication Pages Styles */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(22px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes glowPulse {
  0%, 100% {
    transform: scale(1);
    filter: brightness(1);
  }
  50% {
    transform: scale(1.04);
    filter: brightness(1.12);
  }
}

@keyframes shimmer {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

@keyframes floatOrb {
  0%, 100% { transform: translateY(0px) translateX(0px); }
  50% { transform: translateY(-12px) translateX(8px); }
}

@keyframes cardEntrance {
  0% {
    opacity: 0;
    transform: translateY(30px) scale(0.97);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes pulseGlow {
  0%, 100% {
    box-shadow: 0 10px 25px rgba(16, 185, 129, 0.18);
    transform: translateY(0);
  }
  50% {
    box-shadow: 0 16px 35px rgba(16, 185, 129, 0.28);
    transform: translateY(-2px);
  }
}

@keyframes textSlide {
  0% {
    opacity: 0;
    transform: translateX(-8px) scale(0.98);
  }
  60% {
    opacity: 1;
    transform: translateX(2px) scale(1.01);
  }
  100% {
    opacity: 1;
    transform: translateX(0) scale(1);
  }
}

@keyframes textGlow {
  0%, 100% {
    text-shadow: 0 0 0 rgba(37, 99, 235, 0);
  }
  50% {
    text-shadow: 0 0 12px rgba(37, 99, 235, 0.18);
  }
}

.auth-page {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background:
    radial-gradient(circle at 10% 20%, rgba(37, 99, 235, 0.25), transparent 28%),
    radial-gradient(circle at 90% 10%, rgba(16, 185, 129, 0.2), transparent 24%),
    var(--bg-main);
  padding: 24px;
  position: relative;
  overflow: hidden;
}

.auth-page::before,
.auth-page::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  filter: blur(40px);
  opacity: 0.4;
  animation: floatOrb 7s ease-in-out infinite;
}

.auth-page::before {
  width: 220px;
  height: 220px;
  background: rgba(37, 99, 235, 0.18);
  top: -40px;
  left: -60px;
}

.auth-page::after {
  width: 260px;
  height: 260px;
  background: rgba(16, 185, 129, 0.16);
  bottom: -70px;
  right: -80px;
  animation-delay: 1.5s;
}

.auth-card {
  position: relative;
  z-index: 1;
  background: linear-gradient(135deg, rgba(255,255,255,0.96), rgba(248,250,252,0.9));
  border: 1px solid rgba(255,255,255,0.7);
  border-radius: 24px;
  padding: 36px;
  width: 100%;
  max-width: 460px;
  box-shadow: 0 24px 70px rgba(15, 23, 42, 0.16);
  backdrop-filter: blur(16px);
  transform: translateY(0);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  animation: cardEntrance 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) both;
}

.auth-card:hover {
  transform: translateY(-4px) scale(1.01);
  box-shadow: 0 30px 90px rgba(15, 23, 42, 0.22);
}

.auth-header {
  text-align: center;
  margin-bottom: 24px;
}

.auth-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(16, 185, 129, 0.12);
  color: var(--success);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 14px;
  animation: fadeUp 0.7s ease both;
}

.auth-badge .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
}

.auth-header .logo {
  justify-content: center;
  margin-bottom: 12px;
  animation: fadeUp 0.7s ease both;
}

.auth-header .logo i {
  display: inline-block;
  animation: glowPulse 2s ease-in-out infinite;
}

.auth-header h2 {
  font-size: 1.6rem;
  color: var(--text-main);
  margin-bottom: 8px;
  line-height: 1.2;
  animation: textSlide 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  animation-delay: 0.15s;
}

.auth-header .hero-tag {
  display: inline-block;
  margin-top: 8px;
  padding: 8px 14px;
  border-radius: 999px;
  background: linear-gradient(90deg, rgba(37,99,235,0.12), rgba(16,185,129,0.14), rgba(6,182,212,0.12));
  background-size: 200% auto;
  color: var(--primary);
  font-weight: 700;
  font-size: 0.88rem;
  animation: fadeUp 0.8s ease both, shimmer 2.4s linear infinite, textGlow 2s ease-in-out infinite;
  animation-delay: 0.2s;
}

.auth-header p {
  color: var(--text-sub);
  font-size: 0.95rem;
  animation: fadeUp 0.8s ease both;
  animation-delay: 0.3s;
  margin-top: 10px;
  line-height: 1.7;
}

.auth-card form .form-group {
  animation: fadeUp 0.85s ease both;
  animation-delay: 0.4s;
}

.auth-card form button {
  animation: fadeUp 0.85s ease both;
  animation-delay: 0.5s;
}

.form-group {
  margin-bottom: 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.form-group label {
  font-size: 0.84rem;
  font-weight: 700;
  color: var(--text-sub);
}

.input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.input-wrapper i {
  position: absolute;
  left: 14px;
  color: var(--text-muted);
}

.form-control {
  width: 100%;
  padding: 13px 14px 13px 44px;
  border: 1px solid rgba(148, 163, 184, 0.28);
  background: rgba(248, 250, 252, 0.95);
  color: var(--text-main);
  border-radius: 14px;
  font-size: 0.95rem;
  outline: none;
  transition: all 0.2s ease;
}

.form-control:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
  background: rgba(255,255,255,0.98);
}

.auth-footer {
  text-align: center;
  margin-top: 18px;
  font-size: 0.86rem;
  color: var(--text-sub);
}

.auth-footer a {
  color: var(--primary);
  font-weight: 700;
  transition: color 0.2s ease;
}

.auth-footer a:hover {
  color: var(--success);
  text-decoration: underline;
}
</style>

<div class="auth-page">
  <div class="auth-card animate-fade">
    <div class="auth-header">
      <div class="auth-badge"><span class="dot"></span> Officer Portal</div>
      <div class="logo" style="color: var(--success)">
        <i class="fa-solid fa-user-shield"></i>
      </div>
      <h2>Officer Login</h2>
    </div>
    <form onsubmit="app.handleAdminLogin(event)">
      <div class="form-group">
        <label for="admin-user">Officer Username</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope"></i>
          <input type="text" id="admin-user" class="form-control" required>
        </div>
      </div>
      <div class="form-group">
        <label for="admin-pass">Secure Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="admin-pass" class="form-control" required>
        </div>
      </div>
      <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 10px;">
        Login
      </button>
    </form>
    <div class="auth-footer">
      <p><a href="#" onclick="app.showScreen('screen-user-login')">Candidate Result</a></p>
      <p style="margin-top: 15px;"><a href="#" onclick="app.showScreen('screen-landing')">Back</a></p>
    </div>
  </div>
</div>
