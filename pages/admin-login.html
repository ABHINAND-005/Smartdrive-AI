<style>
/* Authentication Pages Styles */
.auth-page {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top right, var(--primary-glow), transparent),
              var(--bg-main);
  padding: 20px;
}

.auth-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: 40px;
  width: 100%;
  max-width: 440px;
  box-shadow: var(--shadow-xl);
}

.auth-header {
  text-align: center;
  margin-bottom: 30px;
}

.auth-header .logo {
  justify-content: center;
  margin-bottom: 16px;
}

.auth-header h2 {
  font-size: 1.5rem;
  color: var(--text-main);
  margin-bottom: 8px;
}

.auth-header p {
  color: var(--text-sub);
  font-size: 0.9rem;
}

.form-group {
  margin-bottom: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.form-group label {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-sub);
}

.input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.input-wrapper i {
  position: absolute;
  left: 14px;
  color: var(--text-muted);
}

.form-control {
  width: 100%;
  padding: 12px 14px 12px 42px;
  border: 1px solid var(--border-color);
  background-color: var(--bg-main);
  color: var(--text-main);
  border-radius: var(--radius-md);
  font-size: 0.95rem;
  outline: none;
  transition: all 0.2s ease;
}

.form-control:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px var(--primary-glow);
  background-color: var(--bg-card);
}

.auth-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 0.85rem;
  color: var(--text-sub);
}

.auth-footer a {
  color: var(--primary);
  font-weight: 600;
}

.auth-footer a:hover {
  text-decoration: underline;
}
</style>

<div class="auth-page">
  <div class="auth-card animate-fade">
    <div class="auth-header">
      <div class="logo" style="color: var(--success)">
        <i class="fa-solid fa-user-shield"></i> SmartDrive <span>Officer</span>
      </div>
      <h2>RTO Portal Login</h2>
      <p>Sign in with government agency operator credentials</p>
    </div>
    <form onsubmit="app.handleAdminLogin(event)">
      <div class="form-group">
        <label for="admin-user">Officer Username</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope"></i>
          <input type="text" id="admin-user" class="form-control" placeholder="rto.officer.01" required>
        </div>
      </div>
      <div class="form-group">
        <label for="admin-pass">Secure Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="admin-pass" class="form-control" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 10px;">
        <i class="fa-solid fa-shield-halved"></i> Sign In to Terminal
      </button>
    </form>
    <div class="auth-footer">
      <p>Are you a candidate? <a href="#" onclick="app.showScreen('screen-user-login')">Verify Result</a></p>
      <p style="margin-top: 15px;"><a href="#" onclick="app.showScreen('screen-landing')"><i class="fa-solid fa-arrow-left"></i> Back to Home</a></p>
    </div>
  </div>
</div>
