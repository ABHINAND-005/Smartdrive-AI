<style>
/* Provisional License Card Styles */
#eligibility-certificate-card {
  position: relative;
  overflow: hidden;
}
</style>

<div class="grid-cols-1">
  
  <!-- Digital Certificate Card -->
  <div class="card" id="eligibility-certificate-card">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:30px; border-bottom:1px solid var(--border-color); padding-bottom:20px;">
      <div>
        <div style="font-size:0.75rem; font-weight:700; color:var(--text-muted); text-transform:uppercase;">TRANSPORT DEPARTMENT SYSTEM</div>
        <h3 style="font-size:1.5rem; margin-top:2px;">Provisional Licensing Authorization</h3>
      </div>
      <div style="width:48px; height:48px; border-radius:50%; background:var(--primary-light); color:var(--primary); display:flex; align-items:center; justify-content:center; font-size:1.5rem;">
        <i class="fa-solid fa-certificate"></i>
      </div>
    </div>

    <div style="display:flex; flex-direction:column; gap:20px; margin-bottom:30px;">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
        <div>
          <span style="font-size:0.75rem; color:var(--text-muted); font-weight:600; text-transform:uppercase;">CANDIDATE NAME</span>
          <div style="font-weight:700; font-size:1.05rem;" id="cert-name">-</div>
        </div>
        <div>
          <span style="font-size:0.75rem; color:var(--text-muted); font-weight:600; text-transform:uppercase;">APPLICATION NUMBER</span>
          <div style="font-weight:700; font-size:1.05rem;" id="cert-app-no">-</div>
        </div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
        <div>
          <span style="font-size:0.75rem; color:var(--text-muted); font-weight:600; text-transform:uppercase;">LEARNER'S LICENSE (LL)</span>
          <div style="font-weight:700; font-size:1.05rem;" id="cert-ll-no">-</div>
        </div>
        <div>
          <span style="font-size:0.75rem; color:var(--text-muted); font-weight:600; text-transform:uppercase;">AI EVALUATION SCORE</span>
          <div style="font-weight:700; font-size:1.05rem;" id="cert-score">88 / 100</div>
        </div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
        <div>
          <span style="font-size:0.75rem; color:var(--text-muted); font-weight:600; text-transform:uppercase;">ELIGIBILITY STATUS</span>
          <div style="font-weight:700; font-size:1.05rem; color:var(--success)" id="cert-status">APPROVED FOR LICENSE</div>
        </div>
      </div>
    </div>

    <div style="border-top:1px solid var(--border-color); padding-top:20px; display:flex; justify-content:space-between; align-items:center;">
      <div>
        <span style="font-size:0.75rem; color:var(--text-muted); display:block;">DIGITALLY CERTIFIED ON</span>
        <strong id="cert-eval-date">08 June 2026</strong>
      </div>
      <div style="display:flex; gap:12px;">
        <button class="btn btn-secondary" onclick="window.print()">
          <i class="fa-solid fa-print"></i> Print Report
        </button>
      </div>
    </div>
  </div>

</div>
