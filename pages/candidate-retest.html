<style>
/* Retest Slot Booking Calendar */
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-top: 15px;
}

.calendar-day-header {
  text-align: center;
  font-weight: 700;
  font-size: 0.75rem;
  color: var(--text-muted);
  text-transform: uppercase;
}

.calendar-cell {
  aspect-ratio: 1;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  cursor: pointer;
  background-color: var(--bg-card);
  transition: all 0.2s ease;
  position: relative;
}

.calendar-cell.muted {
  color: var(--text-muted);
  background-color: var(--bg-main);
  pointer-events: none;
  border-color: transparent;
}

.calendar-cell:hover:not(.muted) {
  background-color: var(--primary-light);
  border-color: var(--primary);
}

.calendar-cell.active {
  background-color: var(--primary);
  color: white;
  border-color: var(--primary);
}

.calendar-cell.fully-booked {
  background-color: var(--danger-light);
  color: var(--danger);
  pointer-events: none;
}

.calendar-cell.available::after {
  content: "";
  display: block;
  width: 4px;
  height: 4px;
  background-color: var(--success);
  border-radius: 50%;
  position: absolute;
  bottom: 4px;
}
</style>

<div class="grid-cols-2-1">
  
  <!-- Calendar card selection -->
  <div class="card">
    <div class="card-title-bar">
      <h3><i class="fa-solid fa-calendar-days"></i> Slot Booking Calendar</h3>
      <span id="retest-calendar-month" style="font-weight:700; font-size:1.05rem;">June 2026</span>
    </div>
    
    <div class="calendar-grid">
      <div class="calendar-day-header">Sun</div>
      <div class="calendar-day-header">Mon</div>
      <div class="calendar-day-header">Tue</div>
      <div class="calendar-day-header">Wed</div>
      <div class="calendar-day-header">Thu</div>
      <div class="calendar-day-header">Fri</div>
      <div class="calendar-day-header">Sat</div>
      
      <!-- Days render dynamically in app.js -->
    </div>
  </div>

  <!-- Slot selection & booking controls -->
  <div style="display:flex; flex-direction:column; gap:20px;">
    <div class="card">
      <h3 style="margin-bottom:16px;"><i class="fa-solid fa-clock"></i> Available Slots</h3>
      <div id="retest-selected-date-lbl" style="font-weight:700; font-size:0.9rem; color:var(--primary); margin-bottom:14px;">Select a date on the calendar</div>
      
      <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:20px;" id="retest-slots-container">
        <button class="btn btn-secondary" style="justify-content:space-between;" onclick="app.selectSlot(this)">
          <span>09:30 AM - 10:30 AM</span> <span class="badge badge-success">4 Left</span>
        </button>
        <button class="btn btn-secondary" style="justify-content:space-between;" onclick="app.selectSlot(this)">
          <span>11:00 AM - 12:00 PM</span> <span class="badge badge-success">7 Left</span>
        </button>
        <button class="btn btn-secondary" style="justify-content:space-between;" onclick="app.selectSlot(this)">
          <span>02:00 PM - 03:00 PM</span> <span class="badge badge-warning">1 Left</span>
        </button>
      </div>

      <button class="btn btn-primary" style="width:100%;" onclick="app.bookRetest()">
        <i class="fa-solid fa-calendar-check"></i> Book Retest Slot
      </button>
    </div>
  </div>

</div>
